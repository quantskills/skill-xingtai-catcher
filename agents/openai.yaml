interface:
  display_name: "形态捕手"
  short_description: "按文字、K线截图或手绘图查找相似股票/期货，支持固定雷达模板和直接脚本"
  default_prompt: "根据我的文字描述、K线截图或手绘图，使用形态捕手查找相似股票或期货。强趋势延续、底部反转、W底、双底、趋势回踩、震荡整理、M头这类模板词要直接走服务器雷达模板，不要自行画图。如果我没说周期和 BAR 长度，先问我是日线还是 60 分钟、60 BAR 还是 120 BAR。手绘线条图按 drawing 处理，真实 K 线蜡烛图截图才按 upload_screenshot 处理。脚本调用后读取 .xingtai_result.txt 整理回复，不要把 System(untrusted)、Exec completed 或原始 JSON 贴给用户。"
